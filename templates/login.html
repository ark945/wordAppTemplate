<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員登入 - 英文單字小學堂</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary-color);
        }
        .error-message {
            background-color: #fee2e2;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container login-container">
        <div class="card login-card">
            <h1 style="text-align: center; margin-bottom: 30px;">🔐 管理員登入</h1>
            
            {% if error %}
            <div class="error-message">
                ❌ {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="form-group">
                    <label for="username">管理員帳號</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="請輸入帳號" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">管理員密碼</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="請輸入密碼" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;">登入</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← 返回首頁</a>
            </div>
        </div>
    </div>
</body>
</html>
