<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>測試模式 - 英文單字小學堂</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <!-- 模式選擇畫面 -->
        <div id="mode-select-container" class="card" style="display: none; max-width: 800px; margin: 0 auto;">
            <a href="/" style="display: inline-block; text-decoration: none; color: var(--text-muted); font-weight: 600; margin-bottom: 20px;">← 返回首頁</a>
            <h2 style="margin-bottom: 5px; border-bottom: none; padding-bottom: 0; color: var(--text-main); font-weight: 800;">✏️ 選擇測驗模式</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">單元：<strong id="mode-select-unit-name" style="color: var(--primary-color);"></strong></p>
            
            <div class="quiz-mode-card-container">
                <div onclick="selectQuizMode('quiz')" class="quiz-mode-card mode-chinese">
                    <div class="quiz-mode-card-icon">📚</div>
                    <div>
                        <div class="quiz-mode-card-title">選中文</div>
                        <div class="quiz-mode-card-desc">給予英文單字，選出正確的中文解釋。</div>
                    </div>
                </div>
                <div onclick="selectQuizMode('reverse')" class="quiz-mode-card mode-english">
                    <div class="quiz-mode-card-icon">🔍</div>
                    <div>
                        <div class="quiz-mode-card-title">選英文</div>
                        <div class="quiz-mode-card-desc">給予中文定義，選出正確的英文單字。</div>
                    </div>
                </div>
                <div onclick="selectQuizMode('spelling')" class="quiz-mode-card mode-spelling">
                    <div class="quiz-mode-card-icon">✍️</div>
                    <div>
                        <div class="quiz-mode-card-title">拼字測驗</div>
                        <div class="quiz-mode-card-desc">播放英文發音並提供中文提示，拼寫單字。</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" id="quiz-container" style="display: none;">
            <h2 id="unit-title">正在載入試題...</h2>
            <div id="progress" style="margin-bottom: 10px;"></div>

            <div id="question-box" class="word-card">
                <div id="target-word" class="word-main">---</div>
                <button onclick="playAudio()" class="btn">🔊 發音</button>
            </div>

            <div class="options" id="options-box"></div>

            <div id="feedback" style="margin-top: 20px; font-weight: bold; text-align: center;"></div>
        </div>

        <div id="result-container" class="card" style="display: none; text-align: center;">
            <h1>🎉 測驗完成！</h1>
            <h2 id="final-score">得分：0 / 0</h2>
            <p id="email-status">正在發送成績單至您的信箱...</p>
            <a href="/" class="btn btn-primary">回首頁</a>
        </div>
    </div>

    <script>
        const unit = "{{ unit }}";
        // Parse user from URL
        const urlParams = new URLSearchParams(window.location.search);
        const currentUser = urlParams.get('user') || "訪客";

        let words = [];
        let currentIndex = 0;
        let score = 0;
        let wrongWords = [];
        let activeMode = "{{ mode }}"; // 'quiz', 'reverse', 'spelling' or 'None'

        async function init() {
            if (activeMode && activeMode !== "None" && activeMode !== "unified" && activeMode !== "") {
                document.getElementById('mode-select-container').style.display = 'none';
                document.getElementById('quiz-container').style.display = 'block';
                startQuiz();
            } else {
                document.getElementById('quiz-container').style.display = 'none';
                document.getElementById('mode-select-container').style.display = 'block';
                document.getElementById('mode-select-unit-name').innerText = unit;
            }
        }

        function selectQuizMode(chosenMode) {
            activeMode = chosenMode;
            document.getElementById('mode-select-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            startQuiz();
        }

        async function startQuiz() {
            const res = await fetch(`/api/words/${unit}`);
            words = await res.json();
            shuffle(words);
            renderQuestion();
        }

        // Shuffle questions
        function shuffle(array) {
            array.sort(() => Math.random() - 0.5);
        }

        function renderQuestion() {
            if (currentIndex >= words.length) return finishQuiz();

            const target = words[currentIndex];
            const isSpelling = activeMode === 'spelling';
            const isReverse = activeMode === 'reverse';

            document.getElementById('unit-title').innerText = `正在測試 (${modeText(activeMode)})：${unit}`;
            document.getElementById('progress').innerText = `進度：${currentIndex + 1} / ${words.length}`;

            // 1. Setup Question Display
            const targetEl = document.getElementById('target-word');

            if (isSpelling) {
                targetEl.innerText = "請聽音拼寫...";
                targetEl.style.fontSize = "2rem";

                // Explicitly re-render the spelling box to update the hint
                const qBox = document.getElementById('question-box');
                qBox.innerHTML = `
                    <div id="target-word" class="word-main" style="font-size: 2rem; margin-bottom: 20px;">請聽音拼寫...</div>
                    <div class="word-card" style="padding: 0;">
                        <button onclick="playAudio()" class="btn btn-primary" style="margin-bottom:15px;">🔊 播放發音</button>
                        <div style="font-size: 1.5rem; margin-bottom: 20px; color: var(--text-muted, #94a3b8);">提示：${target.definition}</div>
                        
                        <!-- Visualizer for underscores and letters -->
                        <div id="spelling-visualizer" style="display: flex; gap: 8px; justify-content: center; margin-bottom: 25px; min-height: 3.5rem; flex-wrap: wrap;"></div>
                        
                        <input type="text" id="spellingInput" 
                            value="" 
                            maxlength="${target.word.length}"
                            style="position: absolute; opacity: 0; pointer-events: none; z-index: -1;" 
                            placeholder="輸入英文單字" autocomplete="off" 
                            onkeypress="handleSpellingEnter(event)">
                        <button onclick="checkSpelling()" class="btn btn-success" style="margin-top: 10px; display: block; margin: 10px auto;">送出答案</button>
                    </div>
                `;

                const spellingInput = document.getElementById('spellingInput');
                const targetWord = target.word;

                const updateVisualizer = (val) => {
                    const container = document.getElementById('spelling-visualizer');
                    if (!container) return;
                    container.innerHTML = '';
                    
                    for (let i = 0; i < targetWord.length; i++) {
                        const span = document.createElement('span');
                        span.className = 'letter-slot';
                        span.style.display = 'inline-block';
                        span.style.width = '24px';
                        span.style.margin = '0 4px';
                        span.style.textAlign = 'center';
                        span.style.fontSize = '2rem';
                        span.style.fontWeight = 'bold';
                        span.style.fontFamily = 'monospace';
                        
                        const char = targetWord[i];
                        
                        if (char === ' ' || char === '-' || char === "'") {
                            span.innerText = char;
                            span.style.borderBottom = 'none';
                            span.style.color = 'var(--text-main, #f8fafc)';
                        } else {
                            if (i < val.length) {
                                span.innerText = val[i];
                                span.style.borderBottom = '3px solid transparent';
                                span.style.color = 'var(--text-main, #f8fafc)';
                            } else {
                                span.innerHTML = '&nbsp;';
                                span.style.borderBottom = '3px solid var(--text-muted, #94a3b8)';
                            }
                        }
                        container.appendChild(span);
                    }
                };

                updateVisualizer('');

                spellingInput.addEventListener('input', (e) => {
                    updateVisualizer(e.target.value);
                });

                // Focus input on card click
                const wordCard = qBox.querySelector('.word-card');
                if (wordCard) {
                    wordCard.style.cursor = 'pointer';
                    wordCard.addEventListener('click', () => {
                        spellingInput.focus();
                    });
                }

                // Focus input
                setTimeout(() => spellingInput.focus(), 100);
                playAudio(); // Auto play
            } else {
                // Restore standard question box if coming from spelling mode or ensuring structure
                if (document.getElementById('spellingInput') || !document.getElementById('audio-btn')) {
                    document.getElementById('question-box').innerHTML = `
                        <div id="target-word" class="word-main">---</div>
                        <button id="audio-btn" onclick="playAudio()" class="btn">🔊 發音</button>
                     `;
                }

                // Re-select elements after potential innerHTML rewrite
                const tEl = document.getElementById('target-word');
                const audioBtn = document.getElementById('audio-btn');

                if (isReverse) {
                    // Reverse: Show Chinese, Select English
                    tEl.innerText = target.definition;
                    if (audioBtn) audioBtn.style.display = 'none'; // Hide audio
                } else {
                    // Standard: Show English, Select Chinese
                    tEl.innerText = target.word;
                    if (audioBtn) audioBtn.style.display = 'inline-block'; // Show audio
                }
            }

            document.getElementById('feedback').innerText = "";

            // 2. Setup Options (Skip for spelling)
            if (!isSpelling) {
                // Reset Options Box
                const box = document.getElementById('options-box');
                box.innerHTML = "";
                box.style.display = "grid";

                let options = [target];
                while (options.length < 4 && words.length >= 4) {
                    const rand = words[Math.floor(Math.random() * words.length)];
                    if (!options.find(o => o.word === rand.word)) options.push(rand);
                }
                shuffle(options);

                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'quiz-btn';
                    // Reverse: Show Word. Standard: Show Def
                    btn.innerText = isReverse ? opt.word : opt.definition;
                    btn.onclick = () => checkAnswer(opt, target, btn);
                    box.appendChild(btn);
                });
            } else {
                document.getElementById('options-box').style.display = "none";
            }
        }

        function handleSpellingEnter(e) {
            if (e.key === "Enter") checkSpelling();
        }

        async function checkSpelling() {
            const input = document.getElementById('spellingInput');
            const userVal = input.value.trim();
            if (!userVal) return;

            input.disabled = true;
            const target = words[currentIndex];
            const isSpelling = activeMode === 'spelling';
            const slots = document.querySelectorAll('.letter-slot');

            const cleanUser = userVal.toLowerCase().replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"');
            const cleanTarget = target.word.toLowerCase().replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"');

            if (cleanUser === cleanTarget) {
                score++;
                slots.forEach(slot => {
                    slot.style.color = "#10b981";
                    slot.style.textShadow = "0 0 10px rgba(16, 185, 129, 0.4)";
                });
                document.getElementById('feedback').innerHTML = "<span style='color:#10b981; font-size: 1.5rem;'>正確！ Excellent!</span>";
            } else {
                wrongWords.push(target);
                slots.forEach(slot => {
                    slot.style.color = "#ef4444";
                    slot.style.textShadow = "0 0 10px rgba(239, 68, 68, 0.4)";
                });
                document.getElementById('feedback').innerHTML = `<span style='color:#ef4444; font-size: 1.5rem;'>答錯了，正確是：<strong>${target.word}</strong></span>`;
            }

            setTimeout(() => {
                currentIndex++;
                // Restore default structure for next question if needed
                if (!isSpelling) document.getElementById('question-box').innerHTML = `<div id="target-word" class="word-main">---</div><button onclick="playAudio()" class="btn">🔊 發音</button>`;
                renderQuestion();
            }, 2000);
        }

        async function checkAnswer(selected, correct, btn) {
            const btns = document.querySelectorAll('.quiz-btn');
            btns.forEach(b => b.disabled = true);
            const isReverse = activeMode === 'reverse';

            if (selected.word === correct.word) {
                score++;
                btn.classList.add('correct');
                document.getElementById('feedback').innerHTML = "<span style='color:green'>正確！ Excellent!</span>";
            } else {
                wrongWords.push(correct);
                btn.classList.add('wrong');
                // Highlight correct one logic
                btns.forEach(b => {
                    if (isReverse ? (b.innerText === correct.word) : (b.innerText === correct.definition)) {
                        b.classList.add('correct');
                    }
                });
                document.getElementById('feedback').innerHTML = `<span style='color:red'>答錯了！</span>`;
            }

            setTimeout(() => {
                currentIndex++;
                renderQuestion();
            }, 1500);
        }

        function modeText(m) {
            if (m === 'reverse') return "選英文";
            if (m === 'spelling') return "拼字";
            return "選中文";
        }

        async function playAudio() {
            const word = words[currentIndex].word;
            try {
                const res = await fetch(`/api/tts?text=${encodeURIComponent(word)}`);
                const data = await res.json();
                if (data.url) new Audio(data.url).play();
            } catch (e) {
                console.error('TTS error:', e);
            }
        }

        async function finishQuiz() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('final-score').innerText = `得分：${score} / ${words.length}`;

            // Show who took the quiz
            const userDisplay = document.createElement('h3');
            userDisplay.innerText = `受試者：${currentUser}`;
            document.getElementById('final-score').after(userDisplay);

            // Send report
            try {
                await fetch('/api/send_report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        unit: unit,
                        score: score,
                        total: words.length,
                        mode: modeText(activeMode),
                        user_name: currentUser, // Pass user name to backend
                        wrong_words_list: wrongWords
                    })
                });
                document.getElementById('email-status').innerText = "✅ 成績單已寄送！";
            } catch (e) {
                document.getElementById('email-status').innerText = "❌ 郵件發送失敗";
            }
        }

        init();
    </script>
</body>

</html>
